services:

  # Local ClickHouse for development/testing of track-service.
  # NOT for production — production points at the Azure VM ClickHouse.
  # Schema is auto-loaded from track-service/sql/schema.sql on first start
  # via /docker-entrypoint-initdb.d (a feature of the official image).
  clickhouse:
    image: clickhouse/clickhouse-server:24.10
    container_name: clickhouse
    restart: unless-stopped
    ports:
      - "8123:8123"   # HTTP — track-service connects here
      - "9000:9000"   # Native TCP — clickhouse-client / Tabix / DataGrip
    environment:
      CLICKHOUSE_DB:                  featbit
      CLICKHOUSE_USER:                default
      CLICKHOUSE_PASSWORD:            ${CLICKHOUSE_PASSWORD:-clickhouse}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./track-service/sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  rollup-service:
    build:
      context: ./rollup-service
      dockerfile: Dockerfile
    image: featbit/rollup-service:local
    container_name: rollup-service
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      ASPNETCORE_ENVIRONMENT: Development
      DATABASE_URL: ${DATABASE_URL}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME}
      Worker__IntervalSeconds: ${WORKER_INTERVAL_SECONDS:-600}
      Worker__MaxConcurrency: ${WORKER_MAX_CONCURRENCY:-4}
    # Windows/Mac 本地调试时访问宿主机 PostgreSQL 需要加此配置
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  stats-service:
    build:
      context: ./stats-service
      dockerfile: Dockerfile
    image: featbit/stats-service:local
    container_name: stats-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME}
      ANALYSIS_INTERVAL_SECONDS: ${ANALYSIS_INTERVAL_SECONDS:-600}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  clickhouse-data:
