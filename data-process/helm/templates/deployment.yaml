apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "data-process.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ include "data-process.fullname" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "data-process.fullname" . }}
  template:
    metadata:
      labels:
        app: {{ include "data-process.fullname" . }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- end }}

      # ── Containers: rollup-service + stats-service run in the same pod ──────
      containers:

        # ── 1. rollup-service (.NET 10) ────────────────────────────────────────
        - name: rollup-service
          image: "{{ .Values.rollupService.image.repository }}:{{ .Values.rollupService.image.tag }}"
          imagePullPolicy: {{ .Values.rollupService.image.pullPolicy }}
          ports:
            - name: http-rollup
              containerPort: {{ .Values.rollupService.port }}
              protocol: TCP
          env:
            - name: ASPNETCORE_URLS
              value: "http://+:{{ .Values.rollupService.port }}"
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            - name: Worker__IntervalSeconds
              value: {{ .Values.rollupService.worker.intervalSeconds | quote }}
            - name: Worker__MaxConcurrency
              value: {{ .Values.rollupService.worker.maxConcurrency | quote }}
            # Shared secrets
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "data-process.secretName" . }}
                  key: DATABASE_URL
            - name: R2_ACCOUNT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "data-process.secretName" . }}
                  key: R2_ACCOUNT_ID
            - name: R2_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "data-process.secretName" . }}
                  key: R2_ACCESS_KEY_ID
            - name: R2_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "data-process.secretName" . }}
                  key: R2_SECRET_ACCESS_KEY
            - name: R2_BUCKET_NAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "data-process.secretName" . }}
                  key: R2_BUCKET_NAME
          livenessProbe:
            httpGet:
              path: /health
              port: http-rollup
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http-rollup
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            {{- toYaml .Values.rollupService.resources | nindent 12 }}

        # ── 2. stats-service (Python FastAPI) ──────────────────────────────────
        - name: stats-service
          image: "{{ .Values.statsService.image.repository }}:{{ .Values.statsService.image.tag }}"
          imagePullPolicy: {{ .Values.statsService.image.pullPolicy }}
          ports:
            - name: http-stats
              containerPort: {{ .Values.statsService.port }}
              protocol: TCP
          env:
            - name: PORT
              value: {{ .Values.statsService.port | quote }}
            - name: ANALYSIS_INTERVAL_SECONDS
              value: {{ .Values.statsService.analysisIntervalSeconds | quote }}
            # Shared secrets
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "data-process.secretName" . }}
                  key: DATABASE_URL
            - name: R2_ACCOUNT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "data-process.secretName" . }}
                  key: R2_ACCOUNT_ID
            - name: R2_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "data-process.secretName" . }}
                  key: R2_ACCESS_KEY_ID
            - name: R2_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "data-process.secretName" . }}
                  key: R2_SECRET_ACCESS_KEY
            - name: R2_BUCKET_NAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "data-process.secretName" . }}
                  key: R2_BUCKET_NAME
          livenessProbe:
            httpGet:
              path: /health
              port: http-stats
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http-stats
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            {{- toYaml .Values.statsService.resources | nindent 12 }}

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
