# ── Replica count (single pod as required) ────────────────────────────────────
replicaCount: 1

# ── Namespace ──────────────────────────────────────────────────────────────────
namespace: featbit

# ── rollup-service (.NET 10) ──────────────────────────────────────────────────
rollupService:
  image:
    repository: ""       # e.g. myacr.azurecr.io/data-process/rollup-service
    tag: "latest"
    pullPolicy: IfNotPresent
  port: 8080
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  # Worker tuning
  worker:
    intervalSeconds: 600
    maxConcurrency: 4

# ── stats-service (Python FastAPI) ────────────────────────────────────────────
statsService:
  image:
    repository: ""       # e.g. myacr.azurecr.io/data-process/stats-service
    tag: "latest"
    pullPolicy: IfNotPresent
  port: 8000
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  # Analysis loop tuning
  analysisIntervalSeconds: 600

# ── Shared secrets (mounted as env vars from a K8s Secret) ───────────────────
# These are NOT stored here — populate via:
#   kubectl create secret generic data-process-secrets --from-env-file=.env
# or set existingSecret to the name of a pre-created secret.
secrets:
  # Set to the name of an existing secret to skip auto-creation.
  existingSecret: ""
  # Values used only when existingSecret is empty (for local/dev only).
  # For production, use existingSecret or external secret manager.
  create: false
  data:
    DATABASE_URL: ""
    R2_ACCOUNT_ID: ""
    R2_ACCESS_KEY_ID: ""
    R2_SECRET_ACCESS_KEY: ""
    R2_BUCKET_NAME: "featbit-tsdb"

# ── Image pull secret (for ACR) ───────────────────────────────────────────────
imagePullSecrets: []
# - name: acr-pull-secret

# ── Pod-level settings ────────────────────────────────────────────────────────
podAnnotations: {}

nodeSelector: {}

tolerations: []

affinity: {}

serviceAccount:
  create: false
  name: ""
