# ============================================================================
# Release Decision Agent — Docker Compose (E2E testing)
#
# Services:
#   postgres   — shared database (Prisma tables + event tables)
#   web        — Next.js app (frontend + API)
#   data       — .NET data server (track API + ExperimentWorker + MetricCollector)
#   simulator  — sends simulated flag evaluations + metric events
#   sandbox    — Claude Code agent bridge (SSE, GLM backend)
#
# Usage:
#   docker compose up --build
#   open http://localhost:3000          ← web UI
#   open http://localhost:3100          ← sandbox SSE endpoint
#
# Required env vars (put in a .env file — never commit):
#   GLM_API_KEY=<your-zhipuai-key>
# ============================================================================

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: release_decision
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d release_decision"]
      interval: 3s
      timeout: 3s
      retries: 10

  # ── Next.js Web App ─────────────────────────────────────────────────────────
  web:
    build:
      context: ./agent/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SANDBOX_URL: "http://localhost:3100"
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/release_decision
    volumes:
      - ./docker/init-events.sql:/init-events.sql:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/experiments/running || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 30s

  # ── .NET Data Server ────────────────────────────────────────────────────────
  data:
    build:
      context: ./agent/data
      dockerfile: Dockerfile
    ports:
      - "5058:5058"
    environment:
      ConnectionStrings__EventStore: "Host=postgres;Port=5432;Database=release_decision;Username=postgres;Password=postgres"
      ExperimentWorker__IntervalSeconds: "10"
      ExperimentWorker__MaxConcurrency: "4"
      ExperimentWorker__ApiBaseUrl: "http://web:3000"
      ExperimentWorker__PythonPath: "python3"
      SYNC_API_URL: "http://web:3000"
    depends_on:
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5058/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # ── Simulator (continuous mode — keeps running until stopped) ───────────────
  #
  #  Multi-scenario config: three experiments across two layers
  #
  #  Layer A (layer-pricing-page, 100 buckets)
  #    Scenario 1  pricing-hero-copy        offset=0  pct=50  (buckets 0–49)
  #    Scenario 2  pricing-plan-highlight   offset=50 pct=50  (buckets 50–99)
  #  → users are mutually exclusive across these two experiments
  #
  #  Layer B (layer-signup-flow, 100 buckets)
  #    Scenario 3  signup-form-length       offset=0  pct=100 (all buckets)
  #  → runs independently; all users who clear Layer A also clear Layer B
  #
  simulator:
    build:
      context: ./agent/simulator
      dockerfile: Dockerfile
    environment:
      TRACK_API_URL: "http://data:5058/api/track"
      ENV_SECRET: "pricing-env-secret-001"
      SCENARIO_COUNT: "3"
      # ── Scenario 1: Pricing hero copy A/B (Bayesian, already decided) ───────
      SCENARIO_1_FLAG_KEY: "pricing-hero-copy"
      SCENARIO_1_LAYER_ID: "layer-pricing-page"
      SCENARIO_1_LAYER_OFFSET: "0"
      SCENARIO_1_LAYER_PERCENT: "50"
      SCENARIO_1_VARIANTS: "start-trial,get-started-free"
      SCENARIO_1_VARIANT_WEIGHTS: "50,50"
      SCENARIO_1_CONV_RATES: "0.12,0.16"
      SCENARIO_1_METRIC_EVENT: "trial_signup_started"
      SCENARIO_1_GUARDRAIL_EVENTS: "support_chat_open:0.098:0.085,page_error:0.021:0.017"
      # ── Scenario 2: Plan highlight Bandit (3-arm, already decided) ──────────
      SCENARIO_2_FLAG_KEY: "pricing-plan-highlight"
      SCENARIO_2_LAYER_ID: "layer-pricing-page"
      SCENARIO_2_LAYER_OFFSET: "50"
      SCENARIO_2_LAYER_PERCENT: "50"
      SCENARIO_2_VARIANTS: "no-highlight,highlight-pro,highlight-starter"
      SCENARIO_2_VARIANT_WEIGHTS: "12,72,16"
      SCENARIO_2_CONV_RATES: "0.14,0.25,0.19"
      SCENARIO_2_METRIC_EVENT: "plan_click"
      SCENARIO_2_GUARDRAIL_EVENTS: ""
      # ── Scenario 3: Signup form length A/B (Bayesian, actively running) ─────
      SCENARIO_3_FLAG_KEY: "signup-form-length"
      SCENARIO_3_LAYER_ID: "layer-signup-flow"
      SCENARIO_3_LAYER_OFFSET: "0"
      SCENARIO_3_LAYER_PERCENT: "100"
      SCENARIO_3_VARIANTS: "full-form,short-form"
      SCENARIO_3_VARIANT_WEIGHTS: "50,50"
      SCENARIO_3_CONV_RATES: "0.208,0.270"
      SCENARIO_3_METRIC_EVENT: "signup_completed"
      SCENARIO_3_GUARDRAIL_EVENTS: "email_bounce:0.091:0.081,form_error_submitted:0.140:0.113"
      # ── Shared ────────────────────────────────────────────────────────────────
      BATCH_SIZE: "4"
      BATCH_DELAY_MS: "1500"
      STARTUP_DELAY_SEC: "5"
    depends_on:
      data:
        condition: service_healthy

  # ── Sandbox — Claude Code agent bridge (GLM backend) ────────────────────────
  sandbox:
    build:
      context: ./agent/sandbox
      dockerfile: Dockerfile
    ports:
      - "3100:3000"
    environment:
      GLM_API_KEY: ${GLM_API_KEY}
      PORT: 3000
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      SYNC_API_URL: "http://web:3000"
    volumes:
      - ./agent/sandbox/data:/app/data
    depends_on:
      web:
        condition: service_healthy

volumes:
  pgdata:
