{{- if .Values.web.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "web.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "featbit-rda.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  {{- if not .Values.web.autoscaling.enabled }}
  replicas: {{ .Values.web.replicaCount }}
  {{- end }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "featbit-rda.selectorLabels" (dict "root" . "component" "web") | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/database-secret: {{ include (print $.Template.BasePath "/web-database-secret.yaml") . | sha256sum }}
        {{- with .Values.web.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "featbit-rda.selectorLabels" (dict "root" . "component" "web") | nindent 8 }}
        {{- with .Values.web.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "web.serviceAccountName" . }}
      {{- include "featbit-rda.imagePullSecrets" . | nindent 6 }}
      securityContext:
        {{- toYaml .Values.web.podSecurityContext | nindent 8 }}
      terminationGracePeriodSeconds: {{ .Values.web.terminationGracePeriodSeconds }}
      containers:
        - name: web
          image: {{ include "web.image" . }}
          imagePullPolicy: {{ .Values.web.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.web.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.web.service.targetPort }}
              protocol: TCP
          env:
            - name: NODE_ENV
              value: {{ .Values.web.nodeEnv | quote }}
            - name: PORT
              value: {{ .Values.web.service.targetPort | quote }}
            - name: HOSTNAME
              value: "0.0.0.0"
            - name: FEATBIT_API_URL
              value: {{ .Values.web.featbit.apiUrl | quote }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "web.databaseSecretName" . }}
                  key: {{ .Values.web.database.existingSecretKey | quote }}
            {{- with (include "web.trackServiceUrl" .) }}
            - name: TRACK_SERVICE_URL
              value: {{ . | quote }}
            {{- end }}
            {{- $signingSecret := include "web.signingKeySecretName" . }}
            {{- if $signingSecret }}
            - name: TRACK_SERVICE_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $signingSecret }}
                  key: {{ include "web.signingKeySecretKey" . | quote }}
            {{- end }}
            {{- with .Values.web.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            {{- toYaml .Values.web.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.web.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
          {{- with .Values.web.volumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.web.volumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.web.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.web.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.web.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.web.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
