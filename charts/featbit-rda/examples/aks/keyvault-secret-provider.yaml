# Azure Key Vault SecretProviderClass for featbit-rda.
#
# Pulls the ClickHouse connection string from Key Vault and projects it
# into a Kubernetes Secret "featbit-rda-clickhouse-secret" with key
# "connection-string". The Helm chart reads that Secret via
# `trackService.clickHouse.existingSecret` / `.existingSecretKey`.
#
# The secret is named at the umbrella level (featbit-rda-*), not per-service —
# future services in this chart (stats-service, web, ...) connect to the same
# ClickHouse and reuse the same projected Secret.
#
# Prereqs:
#   1. Enable CSI driver:
#        az aks enable-addons --addons azure-keyvault-secrets-provider \
#          --name <cluster> --resource-group <rg>
#
#   2. Grant AKS kubelet identity "Key Vault Secrets User" on the Key Vault:
#        IDENTITY_CLIENT_ID=$(az aks show -g <rg> -n <cluster> \
#          --query identityProfile.kubeletidentity.clientId -o tsv)
#        KV_ID=$(az keyvault show --name <kv> --query id -o tsv)
#        az role assignment create \
#          --role "Key Vault Secrets User" \
#          --assignee $IDENTITY_CLIENT_ID \
#          --scope $KV_ID
#
#   3. Store the ClickHouse connection string:
#        az keyvault secret set --vault-name <kv> \
#          --name featbit-rda-clickhouse-conn \
#          --value "Host=...;Port=8123;Username=default;Password=...;Protocol=http;Database=default"
#
#   4. kubectl create namespace featbit-rda
#      # Edit the placeholders below, then:
#      kubectl apply -f keyvault-secret-provider.local.yaml

apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: featbit-rda-clickhouse-kv
  namespace: featbit-rda
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    # Kubelet identity client ID.
    userAssignedIdentityID: "00000000-0000-0000-0000-000000000000"
    tenantId: "00000000-0000-0000-0000-000000000000"
    keyvaultName: "your-keyvault-name"
    objects: |
      array:
        - |
          objectName: featbit-rda-clickhouse-conn
          objectType: secret
          objectAlias: connection-string
  secretObjects:
    - secretName: featbit-rda-clickhouse-secret
      type: Opaque
      data:
        - objectName: connection-string
          key: connection-string
