# Azure Key Vault SecretProviderClass for featbit-rda.
#
# A single SecretProviderClass + CSI volume projects all umbrella-scoped
# secrets into Kubernetes Secrets that the Helm chart references via
# `existingSecret`. Each pod that consumes one of these secrets must mount
# this same SPC as a CSI volume — the projection is created on first mount,
# then kept in sync.
#
# Projected K8s Secrets (consumed by the chart):
#
#   featbit-rda-clickhouse-secret      (key: connection-string)
#     trackService.clickHouse.existingSecret
#
#   featbit-rda-signing-key-secret     (key: signing-key)
#     trackService.envSecret.existingSecret
#     web.envSecret.existingSecret  (auto-shared when blank)
#
#   featbit-rda-web-database-secret    (key: database-url)
#     web.database.existingSecret
#
#   featbit-rda-sandbox0-secret        (key: api-key)
#     web.extraEnv → SANDBOX0_API_KEY  (referenced via secretKeyRef)
#
# Prereqs:
#   1. Enable CSI driver:
#        az aks enable-addons --addons azure-keyvault-secrets-provider \
#          --name <cluster> --resource-group <rg>
#
#   2. Grant AKS kubelet identity "Key Vault Secrets User" on the Key Vault:
#        IDENTITY_CLIENT_ID=$(az aks show -g <rg> -n <cluster> \
#          --query identityProfile.kubeletidentity.clientId -o tsv)
#        KV_ID=$(az keyvault show --name <kv> --query id -o tsv)
#        az role assignment create \
#          --role "Key Vault Secrets User" \
#          --assignee $IDENTITY_CLIENT_ID \
#          --scope $KV_ID
#
#   3. Store the secrets in Key Vault:
#        az keyvault secret set --vault-name <kv> \
#          --name featbit-rda-clickhouse-conn \
#          --value "Host=...;Port=8443;Username=default;Password=...;Protocol=https;Database=default"
#
#        az keyvault secret set --vault-name <kv> \
#          --name featbit-rda-signing-key \
#          --value "<32+ random bytes, base64>"
#
#        az keyvault secret set --vault-name <kv> \
#          --name featbit-rda-web-database-url \
#          --value "postgresql://user:pass@host:5432/dbname?sslmode=require"
#
#        az keyvault secret set --vault-name <kv> \
#          --name featbit-rda-sandbox0-api-key \
#          --value "<sandbox0 API key — issued by https://sandbox0.ai>"
#
#   4. kubectl create namespace featbit-rda
#      cp keyvault-secret-provider.yaml keyvault-secret-provider.local.yaml
#      # edit tenantId, userAssignedIdentityID, keyvaultName, then:
#      kubectl apply -f keyvault-secret-provider.local.yaml

apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: featbit-rda-secrets-kv
  namespace: featbit-rda
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    # Kubelet identity client ID.
    userAssignedIdentityID: "e2f6263e-0f28-404f-b6ed-6f1534c0256e"
    tenantId: "551443f2-94bb-4dd3-a22f-1d267240fe40"
    keyvaultName: "featbit-kv-wu3"
    objects: |
      array:
        - |
          objectName: featbit-rda-clickhouse-conn
          objectType: secret
          objectAlias: connection-string
        - |
          objectName: featbit-rda-signing-key
          objectType: secret
          objectAlias: signing-key
        - |
          objectName: featbit-rda-web-database-url
          objectType: secret
          objectAlias: database-url
        - |
          objectName: featbit-rda-sandbox0-api-key
          objectType: secret
          objectAlias: sandbox0-api-key
  secretObjects:
    - secretName: featbit-rda-clickhouse-secret
      type: Opaque
      data:
        - objectName: connection-string
          key: connection-string
    - secretName: featbit-rda-signing-key-secret
      type: Opaque
      data:
        - objectName: signing-key
          key: signing-key
    - secretName: featbit-rda-web-database-secret
      type: Opaque
      data:
        - objectName: database-url
          key: database-url
    - secretName: featbit-rda-sandbox0-secret
      type: Opaque
      data:
        - objectName: sandbox0-api-key
          key: api-key
