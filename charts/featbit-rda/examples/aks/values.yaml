# featbit-rda Helm values for Azure AKS
# Architecture: Internet -> Azure LB -> NGINX Ingress (TLS, cert-manager) -> services
#
# Prereqs (once per cluster):
#   - AKS cluster with ACR attached:    az aks update -n <cluster> -g <rg> --attach-acr <acr>
#   - NGINX Ingress Controller installed (see README.md)
#   - cert-manager installed + ClusterIssuer applied (see cluster-issuer.yaml)
#   - (Optional) Azure Key Vault CSI driver enabled if using the KeyVault path
#
# Copy to values.local.yaml, fill the marked fields, then install:
#
#   helm install featbit-rda ../../ \
#     -f values.local.yaml \
#     --namespace featbit-rda --create-namespace

global:
  # CHANGE THIS to your ACR login server; each service will pull <acr>/<repository>:<tag>.
  imageRegistry: your-acr.azurecr.io
  # With `az aks update --attach-acr`, imagePullSecrets is not needed.
  imagePullSecrets: []

# ── track-service ──────────────────────────────────────────────────────────────
trackService:
  enabled: true
  replicaCount: 3

  image:
    # Inherits global.imageRegistry when empty.
    registry: ""
    repository: featbit/track-service
    tag: "0.3.0"
    pullPolicy: IfNotPresent

  # (A) Dev / staging — plain Secret generated from the value below:
  clickHouse:
    connectionString: ""
    database: "featbit"

  # (B) Production — Azure Key Vault via CSI driver.
  #     Apply keyvault-secret-provider.yaml first. The single SPC
  #     `featbit-rda-secrets-kv` projects three Secrets used across services.
  #     The CSI volume mount below triggers the projection — pods that do not
  #     mount the SPC see the Secret as empty.
  #
  # clickHouse:
  #   existingSecret: "featbit-rda-clickhouse-secret"
  #   existingSecretKey: "connection-string"
  #   database: "default"   # match the DB on your ClickHouse
  #
  # envSecret:
  #   existingSecret: "featbit-rda-signing-key-secret"
  #   existingSecretKey: "signing-key"
  #
  # volumeMounts:
  #   - name: featbit-secrets
  #     mountPath: "/mnt/secrets-store"
  #     readOnly: true
  # volumes:
  #   - name: featbit-secrets
  #     csi:
  #       driver: secrets-store.csi.k8s.io
  #       readOnly: true
  #       volumeAttributes:
  #         secretProviderClass: "featbit-rda-secrets-kv"

  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1500m"
      memory: "2Gi"

  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80

  podDisruptionBudget:
    enabled: true
    minAvailable: 2

  # Spread pods across zones for resilience to AZ outages.
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          app.kubernetes.io/component: track-service

  ingress:
    enabled: true
    className: "nginx"
    # CHANGE THIS to your domain.
    host: "track.example.com"
    path: /
    pathType: Prefix
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    tls:
      enabled: true
      secretName: "track-service-tls"

# ── web ────────────────────────────────────────────────────────────────────────
# All web config is runtime — the published image is canonical and pointed at
# any FeatBit backend / track-service / sandbox0 via env vars. Set
# `web.featbit.apiUrl` for self-hosted FeatBit; `extraEnv` (or a projected
# Secret) for sandbox0 keys.
web:
  enabled: true
  replicaCount: 2

  image:
    registry: ""           # inherits global.imageRegistry
    repository: featbit/web
    tag: "0.2.0"
    pullPolicy: IfNotPresent

  # (A) Dev / staging — chart generates a Secret from the value below:
  database:
    connectionString: ""   # postgresql://user:pass@host:5432/dbname?sslmode=require

  # (B) Production — pre-existing Secret projected via Azure Key Vault CSI.
  #     Requires the volumeMounts/volumes block below to actually trigger the
  #     projection. Same SPC as track-service, just a different Secret name.
  # database:
  #   existingSecret: "featbit-rda-web-database-secret"
  #   existingSecretKey: "database-url"
  #
  # envSecret:
  #   existingSecret: "featbit-rda-signing-key-secret"
  #   existingSecretKey: "signing-key"
  #
  # volumeMounts:
  #   - name: featbit-secrets
  #     mountPath: "/mnt/secrets-store"
  #     readOnly: true
  # volumes:
  #   - name: featbit-secrets
  #     csi:
  #       driver: secrets-store.csi.k8s.io
  #       readOnly: true
  #       volumeAttributes:
  #         secretProviderClass: "featbit-rda-secrets-kv"

  # Defaults to in-cluster track-service service. Override only if web should
  # talk to a different track-service deployment.
  trackService:
    url: ""

  # Defaults to reusing the trackService signing-key Secret in this release.
  envSecret:
    existingSecret: ""

  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80

  podDisruptionBudget:
    enabled: true
    minAvailable: 1

  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          app.kubernetes.io/component: web

  ingress:
    enabled: true
    className: "nginx"
    host: "www.featbit.ai"
    path: /
    pathType: Prefix
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
      nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    tls:
      enabled: true
      secretName: "web-tls"
