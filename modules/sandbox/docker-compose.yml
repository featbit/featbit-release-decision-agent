services:
  agent-sandbox:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    environment:
      # Required: your GLM API key from https://open.bigmodel.cn/
      GLM_API_KEY: ${GLM_API_KEY}
      # Optional overrides
      PORT: 3000
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      API_KEY: ${API_KEY:-}
    volumes:
      # Persist writes to data/ so agent changes survive container restarts
      - ./data:/app/data
