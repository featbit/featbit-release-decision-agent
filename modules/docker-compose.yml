services:

  track-service:
    build:
      context: ./track-service
      dockerfile: Dockerfile
    image: featbit/track-service:local
    container_name: track-service
    restart: unless-stopped
    ports:
      - "5050:8080"
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      ASPNETCORE_ENVIRONMENT: Development
      # Read from .env — points at local docker CH or remote Azure VM CH.
      CLICKHOUSE_CONNECTION_STRING: ${CLICKHOUSE_CONNECTION_STRING}
      # HMAC key for env-secret validation. Share the same value with every
      # service that mints tokens (web, run-active-test). When unset the
      # service logs a warning and falls back to "Authorization header = envId".
      TRACK_SERVICE_SIGNING_KEY: ${TRACK_SERVICE_SIGNING_KEY:-}
      Ingest__ChannelCapacity: ${INGEST_CHANNEL_CAPACITY:-100000}
      Ingest__BatchSize:       ${INGEST_BATCH_SIZE:-1000}
      Ingest__FlushIntervalMs: ${INGEST_FLUSH_INTERVAL_MS:-5000}
      # ClickHouse table layout — overrides appsettings.json defaults. Match
      # the values used by your `<database>.<table>` in CH; the chart uses the
      # same keys (charts/featbit-rda/values.yaml → trackService.clickHouse.*).
      ClickHouse__Database:             ${CLICKHOUSE_DATABASE:-featbit}
      ClickHouse__FlagEvaluationsTable: ${CLICKHOUSE_FLAG_EVALUATIONS_TABLE:-flag_evaluations}
      ClickHouse__MetricEventsTable:    ${CLICKHOUSE_METRIC_EVENTS_TABLE:-metric_events}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  run-active-test:
    build:
      context: ./run-active-test-worker
      dockerfile: Dockerfile
    image: featbit/run-active-test:local
    container_name: run-active-test
    restart: unless-stopped
    environment:
      WORKER_URL: "https://track.featbit.ai"
      ENV_ID:     "rat-env-v1"
      # Same signing key as track-service. dev-loop signs envId at startup;
      # leave blank to fall back to the raw envId (legacy track-service).
      TRACK_SERVICE_SIGNING_KEY: ${TRACK_SERVICE_SIGNING_KEY:-}
      TICK_MS:    "5000"
      MAX_EVENTS: "8"

  # The previous `agent-sandbox` and `project-agent` services have been removed.
  # Chat now runs in two modes selected per-browser by the web app itself:
  #   - Managed: web's `/api/sandbox0/*` routes proxy to sandbox0 Managed Agents
  #     (configure via SANDBOX0_API_KEY / SANDBOX0_BASE_URL on the web service).
  #   - Local Claude Code: the user starts `@featbit/experimentation-claude-code-connector`
  #     on their own machine, the browser hits http://127.0.0.1:3100 directly.
  # No backend agent container is needed in compose.

  # Next.js web app — the experiment dashboard / management UI.
  # Connects to Azure PostgreSQL remotely (no local PG needed).
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* is baked in at build time and executed in the browser,
        # so this URL must be reachable from the user's machine — NOT from
        # inside the docker network.
        NEXT_PUBLIC_FEATBIT_API_URL: ${NEXT_PUBLIC_FEATBIT_API_URL:-https://app-api.featbit.co}
    image: featbit/web:local
    container_name: web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL:        ${DATABASE_URL}
      TRACK_SERVICE_URL:   "https://track.featbit.ai"
      # Same key as track-service — web's track-client signs envId per query.
      # Server-side only; never exposed to the browser.
      TRACK_SERVICE_SIGNING_KEY: ${TRACK_SERVICE_SIGNING_KEY:-}
      NODE_ENV:            production
      # sandbox0 Managed Agents (the default chat backend in fresh browsers).
      # Without SANDBOX0_API_KEY the chat panel returns 401 on first message.
      SANDBOX0_API_KEY:    ${SANDBOX0_API_KEY:-}
      SANDBOX0_BASE_URL:   ${SANDBOX0_BASE_URL:-https://agents.sandbox0.ai}
      # Optional knobs — uncomment/override only when needed.
      # TRACK_TIMEOUT_MS:               "10000"
      # ALLOW_PRIVATE_CUSTOMER_ENDPOINTS: "1"     # dev only — permits 127.0.0.1 / 10.* customer endpoints
      # FEATBIT_ACCESS_TOKEN:           ${FEATBIT_ACCESS_TOKEN:-}
      # MANAGED_AGENT_VERSION:          "default"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
