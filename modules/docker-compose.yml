# Self-contained stack: web + track-service + their own PostgreSQL + ClickHouse.
# `docker compose up -d` brings up everything, applies the ClickHouse schema on
# first boot (via clickhouse-server's /docker-entrypoint-initdb.d/), and runs
# Prisma migrations on every web start (via web's docker-entrypoint.sh).
#
# Usage (default — embedded DBs):
#   cd modules
#   cp .env.example .env       # the defaults are fine for first boot
#   docker compose up -d
#   open http://localhost:3000
#
# Usage (external DBs):
#   Override DATABASE_URL and/or CLICKHOUSE_CONNECTION_STRING in .env, then
#   skip the embedded services:
#     docker compose up -d web track-service
#
# To debug locally with build-from-source, layer in docker-compose.local.yml
# — see that file's header.

services:

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-featbit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-featbit_local_pw}
      POSTGRES_DB:       ${POSTGRES_DB:-release_decision}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-featbit} -d ${POSTGRES_DB:-release_decision}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    container_name: clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_USER:                    ${CLICKHOUSE_USER:-featbit}
      CLICKHOUSE_PASSWORD:                ${CLICKHOUSE_PASSWORD:-featbit_local_pw}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
      # CLICKHOUSE_DB pre-creates the database before the initdb scripts run,
      # so schema.sql's `CREATE DATABASE IF NOT EXISTS` becomes a no-op.
      CLICKHOUSE_DB:                      ${CLICKHOUSE_DATABASE:-featbit}
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "${CLICKHOUSE_NATIVE_PORT:-9000}:9000"
    volumes:
      - ch_data:/var/lib/clickhouse
      # First-boot schema apply. clickhouse-server runs *.sql in this dir as
      # part of init when the data dir is empty. Idempotent on re-runs anyway
      # (uses IF NOT EXISTS), but only the first boot triggers it.
      - ./track-service/sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  track-service:
    image: featbit/featbit-rda-track-service:${VERSION:-0.0.2-beta}
    container_name: track-service
    restart: unless-stopped
    depends_on:
      clickhouse:
        condition: service_healthy
    ports:
      - "5050:8080"
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      ASPNETCORE_ENVIRONMENT: Production
      # Defaults to the embedded clickhouse service. Override CLICKHOUSE_CONNECTION_STRING
      # in .env to point at an external CH (and skip the `clickhouse` service).
      CLICKHOUSE_CONNECTION_STRING: ${CLICKHOUSE_CONNECTION_STRING:-Host=clickhouse;Port=8123;User=${CLICKHOUSE_USER:-featbit};Password=${CLICKHOUSE_PASSWORD:-featbit_local_pw};Protocol=http;Database=${CLICKHOUSE_DATABASE:-featbit}}
      # HMAC key for env-secret validation. Share the same value with every
      # service that mints tokens (web, run-active-test). When unset the
      # service logs a warning and falls back to "Authorization header = envId".
      TRACK_SERVICE_SIGNING_KEY: ${TRACK_SERVICE_SIGNING_KEY:-}
      Ingest__ChannelCapacity: ${INGEST_CHANNEL_CAPACITY:-100000}
      Ingest__BatchSize:       ${INGEST_BATCH_SIZE:-1000}
      Ingest__FlushIntervalMs: ${INGEST_FLUSH_INTERVAL_MS:-5000}
      # ClickHouse table layout — overrides appsettings.json defaults. Match
      # the values used by your `<database>.<table>` in CH; the chart uses the
      # same keys (charts/featbit-rda/values.yaml → trackService.clickHouse.*).
      ClickHouse__Database:             ${CLICKHOUSE_DATABASE:-featbit}
      ClickHouse__FlagEvaluationsTable: ${CLICKHOUSE_FLAG_EVALUATIONS_TABLE:-flag_evaluations}
      ClickHouse__MetricEventsTable:    ${CLICKHOUSE_METRIC_EVENTS_TABLE:-metric_events}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # Chat panel runs in two modes, selected per-browser by the web app itself:
  #   - Managed: web's `/api/sandbox0/*` routes proxy to sandbox0 Managed Agents
  #     (configure via SANDBOX0_API_KEY / SANDBOX0_BASE_URL below).
  #   - Local Claude Code: the user starts `@featbit/experimentation-claude-code-connector`
  #     on their own machine, the browser hits http://127.0.0.1:3100 directly.
  # No backend agent container is needed in compose.
  web:
    image: featbit/featbit-rda-web:${VERSION:-0.0.2-beta}
    container_name: web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      # Defaults to the embedded postgres service. Override DATABASE_URL in
      # .env to point at an external PG (and skip the `postgres` service).
      # The web entrypoint runs `prisma migrate deploy` on every start.
      DATABASE_URL:        ${DATABASE_URL:-postgresql://${POSTGRES_USER:-featbit}:${POSTGRES_PASSWORD:-featbit_local_pw}@postgres:5432/${POSTGRES_DB:-release_decision}?sslmode=disable}
      # FeatBit backend the web app authenticates against. Defaults to FeatBit
      # SaaS; self-hosters of FeatBit set this to their own API URL in .env.
      # Server-side only — never sent to the browser (browser goes through
      # the same-origin /api/featbit-proxy route).
      FEATBIT_API_URL:     ${FEATBIT_API_URL:-https://app-api.featbit.co}
      # Defaults to the in-network track-service so `docker compose up -d`
      # works as a full stack out of the box. To run web standalone against
      # an external track-service (or skip it via customer-managed-endpoint),
      # set TRACK_SERVICE_URL in .env.
      TRACK_SERVICE_URL:   ${TRACK_SERVICE_URL:-http://track-service:8080}
      # Same key as track-service — web's track-client signs envId per query.
      # Server-side only; never exposed to the browser.
      TRACK_SERVICE_SIGNING_KEY: ${TRACK_SERVICE_SIGNING_KEY:-}
      NODE_ENV:            production
      # sandbox0 Managed Agents (the default chat backend in fresh browsers).
      # Without SANDBOX0_API_KEY the chat panel returns 401 on first message.
      SANDBOX0_API_KEY:    ${SANDBOX0_API_KEY:-}
      SANDBOX0_BASE_URL:   ${SANDBOX0_BASE_URL:-https://agents.sandbox0.ai}
      # Optional knobs — uncomment/override only when needed.
      # TRACK_TIMEOUT_MS:               "10000"
      # ALLOW_PRIVATE_CUSTOMER_ENDPOINTS: "1"     # dev only — permits 127.0.0.1 / 10.* customer endpoints
      # FEATBIT_ACCESS_TOKEN:           ${FEATBIT_ACCESS_TOKEN:-}
      # MANAGED_AGENT_VERSION:          "default"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  pg_data:
  ch_data:
