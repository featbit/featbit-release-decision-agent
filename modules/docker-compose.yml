services:

  track-service:
    build:
      context: ./track-service
      dockerfile: Dockerfile
    image: featbit/track-service:local
    container_name: track-service
    restart: unless-stopped
    ports:
      - "5050:8080"
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      ASPNETCORE_ENVIRONMENT: Development
      # Read from .env — points at local docker CH or remote Azure VM CH.
      CLICKHOUSE_CONNECTION_STRING: ${CLICKHOUSE_CONNECTION_STRING}
      # HMAC key for env-secret validation. Share the same value with every
      # service that mints tokens (web, run-active-test). When unset the
      # service logs a warning and falls back to "Authorization header = envId".
      TRACK_SERVICE_SIGNING_KEY: ${TRACK_SERVICE_SIGNING_KEY:-}
      Ingest__ChannelCapacity: ${INGEST_CHANNEL_CAPACITY:-100000}
      Ingest__BatchSize:       ${INGEST_BATCH_SIZE:-1000}
      Ingest__FlushIntervalMs: ${INGEST_FLUSH_INTERVAL_MS:-5000}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  run-active-test:
    build:
      context: ./run-active-test-worker
      dockerfile: Dockerfile
    image: featbit/run-active-test:local
    container_name: run-active-test
    restart: unless-stopped
    environment:
      WORKER_URL: "https://track.featbit.ai"
      ENV_ID:     "rat-env-v1"
      # Same signing key as track-service. dev-loop signs envId at startup;
      # leave blank to fall back to the raw envId (legacy track-service).
      TRACK_SERVICE_SIGNING_KEY: ${TRACK_SERVICE_SIGNING_KEY:-}
      TICK_MS:    "5000"
      MAX_EVENTS: "8"

  # Claude Agent SDK server — streams agent responses over SSE.
  # Routes Claude Code traffic through GLM via ~/.claude/settings.json written
  # by docker-entrypoint.sh at container start (see sandbox/docker-entrypoint.sh).
  agent-sandbox:
    build:
      context: ./sandbox
      dockerfile: Dockerfile
    image: featbit/agent-sandbox:local
    container_name: agent-sandbox
    restart: unless-stopped
    ports:
      # Host 3100 → container 3000. The browser (not another container)
      # is what talks to this service, so the host port matters.
      - "3100:3000"
    environment:
      GLM_API_KEY:   ${GLM_API_KEY}
      PORT:          3000
      CORS_ORIGINS:  ${SANDBOX_CORS_ORIGINS:-*}
      API_KEY:       ${SANDBOX_API_KEY:-}
      # project-sync skill's sync.ts calls the web app's /api/experiments/*
      # endpoints. Inside the docker network the web service is reachable
      # as http://web:3000 (localhost would hit sandbox itself).
      SYNC_API_URL:      "http://web:3000"
      MEMORY_API_BASE:   "http://web:3000"
    volumes:
      - ./sandbox/data:/app/data
      # Global skills — mounted read-only from repo root /skills.
      # Claude Code SDK loads user-level skills from ~/.claude/skills/.
      - ../skills:/root/.claude/skills:ro

  # Project-level AI agent — onboarding + shared project memory over SSE.
  # Codex binary needs seccomp:unconfined for Linux landlock sandbox.
  project-agent:
    build:
      context: ..
      dockerfile: modules/project-agent/Dockerfile
    image: featbit/project-agent:local
    container_name: project-agent
    restart: unless-stopped
    ports:
      - "3031:3031"
    environment:
      PORT: 3031
      MEMORY_API_BASE: "http://web:3000"
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      CODEX_HOME: /app/codex-config
      NODE_ENV: production
    volumes:
      - ./project-agent/codex-config:/app/codex-config
    security_opt:
      - seccomp:unconfined
    depends_on:
      web:
        condition: service_healthy

  # Next.js web app — the experiment dashboard / management UI.
  # Connects to Azure PostgreSQL remotely (no local PG needed).
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* is baked in at build time and executed in the browser,
        # so this URL must be reachable from the user's machine — NOT from
        # inside the docker network. http://agent-sandbox:3000 would not work.
        NEXT_PUBLIC_SANDBOX_URL: ${NEXT_PUBLIC_SANDBOX_URL:-http://localhost:3100}
        # FeatBit backend that handles authentication (login, OAuth, SSO).
        # Same constraint: must be browser-reachable.
        NEXT_PUBLIC_FEATBIT_API_URL: ${NEXT_PUBLIC_FEATBIT_API_URL:-https://app-api.featbit.co}
    image: featbit/web:local
    container_name: web
    restart: unless-stopped
    depends_on:
      agent-sandbox:
        condition: service_started
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL:        ${DATABASE_URL}
      TRACK_SERVICE_URL:   "https://track.featbit.ai"
      # Same key as track-service — web's track-client signs envId per query.
      # Server-side only; never exposed to the browser.
      TRACK_SERVICE_SIGNING_KEY: ${TRACK_SERVICE_SIGNING_KEY:-}
      NODE_ENV:            production
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
