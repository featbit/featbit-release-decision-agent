services:

  # Local ClickHouse for development/testing of track-service.
  # NOT for production — production points at the Azure VM ClickHouse.
  # Schema is auto-loaded from track-service/sql/schema.sql on first start
  # via /docker-entrypoint-initdb.d (a feature of the official image).
  clickhouse:
    image: clickhouse/clickhouse-server:24.10
    container_name: clickhouse
    restart: unless-stopped
    ports:
      - "8123:8123"   # HTTP — track-service connects here
      - "9000:9000"   # Native TCP — clickhouse-client / Tabix / DataGrip
    environment:
      CLICKHOUSE_DB:                  featbit
      CLICKHOUSE_USER:                default
      CLICKHOUSE_PASSWORD:            ${CLICKHOUSE_PASSWORD:-clickhouse}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./track-service/sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  track-service:
    build:
      context: ./track-service
      dockerfile: Dockerfile
    image: featbit/track-service:local
    container_name: track-service
    restart: unless-stopped
    depends_on:
      clickhouse:
        condition: service_healthy
    ports:
      - "5050:8080"
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      ASPNETCORE_ENVIRONMENT: Development
      # Inside the compose network, "clickhouse" resolves to the CH container.
      CLICKHOUSE_CONNECTION_STRING: "Host=clickhouse;Port=8123;Username=default;Password=${CLICKHOUSE_PASSWORD:-clickhouse};Protocol=http;Database=featbit"
      Ingest__ChannelCapacity: ${INGEST_CHANNEL_CAPACITY:-100000}
      Ingest__BatchSize:       ${INGEST_BATCH_SIZE:-1000}
      Ingest__FlushIntervalMs: ${INGEST_FLUSH_INTERVAL_MS:-5000}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  run-active-test:
    build:
      context: ./run-active-test-worker
      dockerfile: Dockerfile
    image: featbit/run-active-test:local
    container_name: run-active-test
    restart: unless-stopped
    depends_on:
      track-service:
        condition: service_healthy
    environment:
      WORKER_URL: "http://track-service:8080"
      ENV_ID:     "rat-env-v1"
      TICK_MS:    "5000"
      MAX_EVENTS: "8"

  # Next.js web app — the experiment dashboard / management UI.
  # Connects to Azure PostgreSQL remotely (no local PG needed).
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    image: featbit/web:local
    container_name: web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NODE_ENV:     production
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  clickhouse-data:
