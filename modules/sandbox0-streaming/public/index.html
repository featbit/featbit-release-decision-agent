<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FeatBit Release Decision Agent</title>
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --border: #2a2a2a;
    --text: #e0e0e0;
    --text-muted: #808080;
    --accent: #6366f1;
    --accent-hover: #818cf8;
    --user-bg: #1e293b;
    --agent-bg: #1a1a1a;
    --sidebar-bg: #141414;
    --sidebar-hover: #1f1f1f;
    --sidebar-active: #252525;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    --mono: "SF Mono", "Fira Code", "Cascadia Code", monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
  }

  /* ── Sidebar ──────────────────────────────────────────────────────────────── */

  #sidebar {
    width: 260px;
    background: var(--sidebar-bg);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }

  #sidebar-header {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  #experiment-row {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  #experiment-row label {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  #experiment-select {
    width: 100%;
    padding: 8px 10px;
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 12px;
    font-family: var(--mono);
    cursor: pointer;
  }

  #experiment-select:focus { outline: 1px solid var(--accent); }
  #experiment-select:disabled { opacity: 0.5; cursor: not-allowed; }

  #new-chat {
    width: 100%;
    padding: 10px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
  }

  #new-chat:hover:not(:disabled) { background: var(--accent-hover); }
  #new-chat:disabled { opacity: 0.5; cursor: not-allowed; }

  #session-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }

  .session-item {
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    margin-bottom: 2px;
    transition: background 0.15s;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .session-item:hover { background: var(--sidebar-hover); }
  .session-item.active { background: var(--sidebar-active); }

  .session-item .label {
    font-size: 13px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }

  .session-item .time {
    font-size: 11px;
    color: var(--text-muted);
    flex-shrink: 0;
    margin-left: 8px;
  }

  .session-item .delete-btn {
    display: none;
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 14px;
    padding: 0 4px;
    margin-left: 4px;
    flex-shrink: 0;
  }

  .session-item:hover .delete-btn { display: block; }
  .session-item .delete-btn:hover { color: #ef4444; }

  #sidebar-footer {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--text-muted);
  }

  #clear-all {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 11px;
    cursor: pointer;
    padding: 0;
  }

  #clear-all:hover { color: #ef4444; }

  /* ── Main area ────────────────────────────────────────────────────────────── */

  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  header h1 {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.02em;
  }

  #status {
    font-size: 12px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  #status .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #555;
    transition: background 0.3s;
  }

  #status.connected .dot { background: #22c55e; }
  #status.running .dot { background: #f59e0b; animation: pulse 1s infinite; }
  #status.error .dot { background: #ef4444; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .msg {
    max-width: 720px;
    width: 100%;
    margin: 0 auto;
    padding: 14px 18px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .msg.user {
    background: var(--user-bg);
    align-self: flex-end;
    border: 1px solid #2d3a4d;
  }

  .msg.agent {
    background: var(--agent-bg);
    border: 1px solid var(--border);
  }

  .msg.system {
    background: transparent;
    color: var(--text-muted);
    font-size: 12px;
    text-align: center;
    padding: 8px;
  }

  .msg.agent code {
    background: #2a2a2a;
    padding: 1px 5px;
    border-radius: 4px;
    font-family: var(--mono);
    font-size: 13px;
  }

  .msg.agent pre {
    background: #111;
    padding: 12px;
    border-radius: 8px;
    overflow-x: auto;
    margin: 8px 0;
    font-family: var(--mono);
    font-size: 13px;
  }

  .msg .tool-badge {
    display: inline-block;
    background: #2d2040;
    color: #c084fc;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-family: var(--mono);
    margin: 4px 0;
  }

  .typing {
    display: inline-flex;
    gap: 4px;
    padding: 4px 0;
  }

  .typing span {
    width: 6px;
    height: 6px;
    background: var(--text-muted);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }

  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  #input-area {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  #input-row {
    max-width: 720px;
    margin: 0 auto;
    display: flex;
    gap: 10px;
  }

  #prompt {
    flex: 1;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    resize: none;
    outline: none;
    min-height: 44px;
    max-height: 160px;
    transition: border-color 0.2s;
  }

  #prompt:focus { border-color: var(--accent); }
  #prompt::placeholder { color: var(--text-muted); }

  #send-btn {
    padding: 0 20px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }

  #send-btn:hover { background: var(--accent-hover); }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Empty state ──────────────────────────────────────────────────────────── */

  #empty-state {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    font-size: 14px;
  }
</style>
</head>
<body>

<!-- Sidebar -->
<div id="sidebar">
  <div id="sidebar-header">
    <div id="experiment-row">
      <label for="experiment-select">Experiment</label>
      <select id="experiment-select" disabled>
        <option value="">Loading...</option>
      </select>
    </div>
    <button id="new-chat" disabled>+ New Chat</button>
  </div>
  <div id="session-list"></div>
  <div id="sidebar-footer">
    <button id="clear-all">Clear all history</button>
  </div>
</div>

<!-- Main -->
<div id="main">
  <header>
    <h1>FeatBit Release Decision Agent</h1>
    <div id="status"><span class="dot"></span><span id="status-text">Ready</span></div>
  </header>

  <div id="messages">
    <div id="empty-state">Click "+ New Chat" to start a conversation</div>
  </div>

  <div id="input-area">
    <div id="input-row">
      <textarea id="prompt" rows="1" placeholder="Click + New Chat to start..." disabled autofocus></textarea>
      <button id="send-btn">Send</button>
    </div>
  </div>
</div>

<script>
const $messages   = document.getElementById("messages");
const $prompt     = document.getElementById("prompt");
const $sendBtn    = document.getElementById("send-btn");
const $status     = document.getElementById("status");
const $statusTx   = document.getElementById("status-text");
const $sessionList = document.getElementById("session-list");
const $newChat    = document.getElementById("new-chat");
const $clearAll   = document.getElementById("clear-all");
const $emptyState = document.getElementById("empty-state");
const $expSelect  = document.getElementById("experiment-select");

const STORAGE_KEY = "s0_sessions";
const EXP_STORAGE_KEY = "s0_selected_experiment";

let currentId = null;   // active session id
let busy = false;
let seenEventIds = new Set();

// ── LocalStorage helpers ─────────────────────────────────────────────────────

function loadSessions() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { return []; }
}

function saveSessions(list) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
}

function getSession(id) {
  return loadSessions().find(s => s.id === id);
}

function updateSession(id, patch) {
  const list = loadSessions();
  const s = list.find(s => s.id === id);
  if (s) Object.assign(s, patch);
  saveSessions(list);
}

function addSession(sessionId, firstMessage) {
  const list = loadSessions();
  list.unshift({
    id: sessionId,
    label: firstMessage.substring(0, 50),
    createdAt: new Date().toISOString(),
    messages: [],  // { role, html }
  });
  saveSessions(list);
}

function deleteSession(id) {
  saveSessions(loadSessions().filter(s => s.id !== id));
  if (currentId === id) startNewChat();
  renderSidebar();
}

function appendMessage(sessionId, role, html) {
  const list = loadSessions();
  const s = list.find(s => s.id === sessionId);
  if (s) {
    s.messages.push({ role, html });
    saveSessions(list);
  }
}

// ── Sidebar rendering ────────────────────────────────────────────────────────

function renderSidebar() {
  const list = loadSessions();
  $sessionList.innerHTML = "";

  for (const s of list) {
    const div = document.createElement("div");
    div.className = "session-item" + (s.id === currentId ? " active" : "");

    const label = document.createElement("span");
    label.className = "label";
    label.textContent = s.label || s.id;

    const time = document.createElement("span");
    time.className = "time";
    const d = new Date(s.createdAt);
    time.textContent = d.toLocaleDateString("zh-CN", { month: "short", day: "numeric" });

    const del = document.createElement("button");
    del.className = "delete-btn";
    del.textContent = "\u00d7";
    del.onclick = (e) => { e.stopPropagation(); deleteSession(s.id); };

    div.appendChild(label);
    div.appendChild(time);
    div.appendChild(del);

    div.onclick = () => switchSession(s.id);
    $sessionList.appendChild(div);
  }
}

// ── Session switching ────────────────────────────────────────────────────────

function switchSession(id) {
  if (busy) return;
  currentId = id;
  seenEventIds.clear();

  $messages.innerHTML = "";
  const s = getSession(id);
  if (s && s.messages) {
    for (const m of s.messages) {
      addMsgDom(m.role, m.html);
    }
    // Re-populate seenEventIds isn't needed since we use localStorage for display
  }

  if (!s || !s.messages || s.messages.length === 0) {
    showEmpty();
  }

  $prompt.disabled = false;
  $prompt.placeholder = "Ask something...";
  renderSidebar();
  setStatus("connected", "Ready");
}

async function safeFetch(url, init) {
  const res = await fetch(url, init);
  const text = await res.text();
  let data = null;
  try { data = text ? JSON.parse(text) : null; } catch { /* non-JSON body */ }
  if (!res.ok || (data && data.error)) {
    const msg = (data && data.error) || text || `HTTP ${res.status}`;
    throw new Error(msg);
  }
  return data ?? {};
}

async function createNewSession() {
  const experimentId = $expSelect.value;
  if (!experimentId) throw new Error("Pick an experiment first");
  setStatus("running", "Creating session...");
  const data = await safeFetch("/chat/start", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ experimentId }),
  });
  currentId = data.sessionId;
  seenEventIds.clear();
  addSession(currentId, experimentId);
  renderSidebar();
}

async function loadExperiments() {
  try {
    const data = await safeFetch("/experiments");
    const items = data.experiments || [];
    const saved = localStorage.getItem(EXP_STORAGE_KEY) || "";
    $expSelect.innerHTML = "";
    if (items.length === 0) {
      const opt = document.createElement("option");
      opt.value = "";
      opt.textContent = "(no experiments in DB)";
      $expSelect.appendChild(opt);
      $expSelect.disabled = true;
      $newChat.disabled = true;
      return;
    }
    const placeholder = document.createElement("option");
    placeholder.value = "";
    placeholder.textContent = "— Pick an experiment —";
    $expSelect.appendChild(placeholder);
    for (const exp of items) {
      const opt = document.createElement("option");
      opt.value = exp.id;
      opt.textContent = exp.name ? `${exp.name}  (${exp.id})` : exp.id;
      $expSelect.appendChild(opt);
    }
    if (saved && items.some((e) => e.id === saved)) {
      $expSelect.value = saved;
    }
    $expSelect.disabled = false;
    $newChat.disabled = !$expSelect.value;
  } catch (err) {
    $expSelect.innerHTML = "";
    const opt = document.createElement("option");
    opt.value = "";
    opt.textContent = "Error loading experiments";
    $expSelect.appendChild(opt);
    $expSelect.disabled = true;
    $newChat.disabled = true;
    console.error("loadExperiments:", err);
  }
}

async function startNewChat() {
  if (busy) return;
  busy = true;
  $sendBtn.disabled = true;
  currentId = null;
  seenEventIds.clear();
  $messages.innerHTML = "";

  try {
    await createNewSession();

    // Poll for agent greeting (triggered by bootstrap message)
    const typing = addMsgDom("agent",
      '<div class="typing"><span></span><span></span><span></span></div>');
    setStatus("running", "Agent is starting...");

    await pollForResponse(typing);
  } catch (err) {
    addMsg("system", "Error: " + escHtml(err.message));
    setStatus("error", "Error");
  }

  busy = false;
  $sendBtn.disabled = false;
  $prompt.disabled = false;
  $prompt.placeholder = "Ask something...";
  $prompt.focus();
}

function showEmpty() {
  if (!document.getElementById("empty-state")) {
    const div = document.createElement("div");
    div.id = "empty-state";
    div.textContent = "Start a new chat or select one from the sidebar";
    $messages.appendChild(div);
  }
}

// ── Helpers ──────────────────────────────────────────────────────────────────

function setStatus(cls, text) {
  $status.className = cls;
  $statusTx.textContent = text;
}

function addMsgDom(role, html) {
  const empty = document.getElementById("empty-state");
  if (empty) empty.remove();

  const div = document.createElement("div");
  div.className = "msg " + role;
  div.innerHTML = html;
  $messages.appendChild(div);
  $messages.scrollTop = $messages.scrollHeight;
  return div;
}

function addMsg(role, html) {
  if (currentId) appendMessage(currentId, role, html);
  return addMsgDom(role, html);
}

function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function renderMd(text) {
  text = text.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) =>
    `<pre>${escHtml(code.trim())}</pre>`);
  text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/^## (.+)$/gm, '<strong style="font-size:15px">$1</strong>');
  return text;
}

$prompt.addEventListener("input", () => {
  $prompt.style.height = "auto";
  $prompt.style.height = Math.min($prompt.scrollHeight, 160) + "px";
});

// ── Incremental poll ─────────────────────────────────────────────────────────

async function pollForResponse(typingEl) {
  let done = false;
  let polls = 0;
  const maxPolls = 180;

  while (!done && polls < maxPolls) {
    polls++;
    await sleep(2000);

    const qs = new URLSearchParams({ sessionId: currentId });
    const res = await fetch("/chat/events?" + qs);
    const data = await res.json();

    const newEvents = data.events.filter(e => !seenEventIds.has(e.id));

    if (newEvents.length > 0 && typingEl && typingEl.parentNode) {
      typingEl.remove();
      typingEl = null;
    }

    for (const evt of newEvents) {
      seenEventIds.add(evt.id);

      if (evt.type === "agent.message" && evt.content) {
        addMsg("agent", renderMd(evt.content));
      } else if (evt.type === "agent.tool_use") {
        addMsg("agent",
          `<span class="tool-badge">tool: ${escHtml(evt.toolName || "unknown")}</span>`);
      } else if (evt.type === "agent.tool_result" && evt.content) {
        const preview = evt.content.length > 300
          ? evt.content.substring(0, 300) + "..." : evt.content;
        addMsg("agent",
          `<span class="tool-badge">result</span><pre>${escHtml(preview)}</pre>`);
      }
    }

    done = data.done;

    if (!done) {
      const running = newEvents.filter(e =>
        e.type === "agent.tool_use" || e.type === "agent.thinking");
      if (running.length > 0) {
        const last = running[running.length - 1];
        setStatus("running",
          last.type === "agent.tool_use"
            ? `Running ${last.toolName || "tool"}...` : "Thinking...");
      }
    }
  }

  if (typingEl && typingEl.parentNode) typingEl.remove();

  if (done) {
    setStatus("connected", "Ready");
  } else {
    addMsg("system", "Timed out waiting for response");
    setStatus("error", "Timeout");
  }
}

// ── Send ─────────────────────────────────────────────────────────────────────

async function send() {
  const text = $prompt.value.trim();
  if (!text || busy) return;

  busy = true;
  $sendBtn.disabled = true;
  $prompt.value = "";
  $prompt.style.height = "auto";

  addMsg("user", escHtml(text));

  try {
    if (!currentId) {
      // Should not happen — session is created by "New Chat"
      await createNewSession();
    }

    setStatus("running", "Sending...");
    await safeFetch("/chat/send", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ sessionId: currentId, message: text }),
    });

    const typing = addMsgDom("agent",
      '<div class="typing"><span></span><span></span><span></span></div>');
    setStatus("running", "Thinking...");
    await pollForResponse(typing);

  } catch (err) {
    addMsg("system", "Error: " + escHtml(err.message));
    setStatus("error", "Error");
  }

  busy = false;
  $sendBtn.disabled = false;
  $prompt.focus();
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ── Events ───────────────────────────────────────────────────────────────────

$sendBtn.addEventListener("click", send);
$prompt.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
});
$newChat.addEventListener("click", startNewChat);
$clearAll.addEventListener("click", () => {
  if (confirm("Clear all chat history?")) {
    saveSessions([]);
    renderSidebar();
  }
});
$expSelect.addEventListener("change", () => {
  localStorage.setItem(EXP_STORAGE_KEY, $expSelect.value);
  $newChat.disabled = !$expSelect.value;
});

// ── Init ─────────────────────────────────────────────────────────────────────

renderSidebar();
setStatus("connected", "Ready");
loadExperiments();
</script>
</body>
</html>
